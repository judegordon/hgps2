name: Bug report
description: Report a bug or unexpected behaviour
title: "[BUG]: "
labels:
  - bug

body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: Clear and concise description of the issue
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Use config ...
        2. Run command ...
        3. Observe issue ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      placeholder: What should have happened?
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Ubuntu 24.04 / Windows 11 / etc.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: Version 3.0.0
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      placeholder: Logs, screenshots, extra notes...